<!DOCTYPE html>
<html>
<head>
    <title>Edit Product</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="header">
    <h1>Edit Product</h1>
</div>

<div style="padding:20px;">

    <form method="POST">

        <label>Product Name:</label><br>
        <input type="text"
               name="product_name"
               value="{{ product[1] }}"
               required>
        <br><br>

        <label>Category:</label><br>

        <select name="category_id">

            {% for category in categories %}

            <option value="{{ category[0] }}"
            {% if category[0] == product[2] %}
                selected
            {% endif %}
            >
                {{ category[1] }}
            </option>

            {% endfor %}

        </select>

        <br><br>

        <label>Price:</label><br>
        <input type="number"
               step="0.01"
               name="price"
               value="{{ product[3] }}"
               required>

        <br><br>

        <label>Stock Quantity:</label><br>
        <input type="number"
               name="stock_quantity"
               value="{{ product[4] }}"
               required>

        <br><br>

        <button type="submit">
            Update Product
        </button>

    </form>

    <br>

    <a href="/products">
        <button>Back To Products</button>
    </a>

</div>

</body>
</html>
